# Application
spring.application.name=banking-system
server.port=8080

# Database Configuration (H2 in-memory for development)
spring.datasource.url=jdbc:h2:mem:banking_system;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize schema
spring.sql.init.mode=never

# Logging
logging.level.com.bankingsystem=INFO
logging.level.org.springframework.security=WARN
