# Application
spring.application.name=banking-system
server.port=8080

# Database Configuration
# Set DB_URL, DB_USERNAME, and DB_PASSWORD as environment variables in production
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/banking_system?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize schema
spring.sql.init.mode=never

# Logging
logging.level.com.bankingsystem=INFO
logging.level.org.springframework.security=WARN
